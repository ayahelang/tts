<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" href="data:,🦅" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Silverhawk Translator</title>

    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="container">
      <h1>🦅 Silverhawk Translator</h1>
      <p class="tagline">translate and read aloud your words free</p>

      <div class="translator">
        <!-- INPUT -->

        <div class="box">
          <div class="lang-select">
            <img id="flagInput" src="https://flagcdn.com/id.svg" />

            <select id="inputLang">
              <option value="ar">Arabic</option>
              <option value="nl">Dutch</option>
              <option value="en">English</option>
              <option value="fil">Filipino</option>
              <option value="fr">French</option>
              <option value="de">German</option>
              <option value="he">Hebrew</option>
              <option value="hi">Hindi</option>
              <option value="id">Indonesian</option>
              <option value="it">Italian</option>
              <option value="ja">Japanese</option>
              <option value="ko">Korean</option>
              <option value="es">Spanish</option>
              <option value="th">Thai</option>
              <option value="vi">Vietnamese</option>
              <option value="zh">Chinese</option>
            </select>
          </div>

          <div class="template-bar">
            <select id="templateSelect">
              <option value="">Load Conversation Template</option>
              <option value="hotel">Hotel Lobby Conversation</option>
              <option value="airport">Airport Check-in Conversation</option>
              <option value="restaurant">Restaurant Conversation</option>
              <option value="shopping">Shopping Conversation</option>
            </select>

            <input
              id="promptInput"
              placeholder="or type prompt e.g. hotel conversation guest and receptionist"
            />

            <button id="generatePrompt">Generate</button>
          </div>

          <textarea
            id="inputText"
            placeholder="Type or speak your text..."
          ></textarea>

          <div class="actions">
            <button id="mic">
              <i class="fa fa-microphone"></i>
            </button>

            <button id="speakInput">
              <i class="fa fa-volume-up"></i>
            </button>

            <button id="copyInput">
              <i class="fa fa-copy"></i>
            </button>

            <div id="charCount">0 / 500</div>
          </div>
        </div>

        <div class="centerButtons">
          <button id="translateBtn" title="Translate">
            <i class="fa-solid fa-language"></i>
          </button>

          <button id="reverseBtn" title="Swap Language">
            <i class="fa-solid fa-right-left"></i>
          </button>

          <button id="themeBtn" title="Dark / Light">
            <i class="fa-solid fa-circle-half-stroke"></i>
          </button>
        </div>

        <!-- OUTPUT -->

        <div class="box">
          <div class="lang-select">
            <img id="flagOutput" src="https://flagcdn.com/us.svg" />

            <select id="outputLang">
              <option value="id">Indonesia</option>
              <option value="en">English</option>
              <option value="fr">Français</option>
              <option value="zh">Mandarin</option>
              <option value="de" selected>Deutsch</option>
            </select>

            <div class="flag-bar">
              <img src="https://flagcdn.com/de.svg" onclick="setLang('de')" />
              <img src="https://flagcdn.com/us.svg" onclick="setLang('en')" />
              <img src="https://flagcdn.com/id.svg" onclick="setLang('id')" />
              <img src="https://flagcdn.com/fr.svg" onclick="setLang('fr')" />
              <img src="https://flagcdn.com/cn.svg" onclick="setLang('zh')" />
            </div>
          </div>

          <textarea id="outputText" readonly></textarea>

          <div class="outputActions">
            <div class="actions">
              <button id="speakOutput">
                <i class="fa fa-volume-up"></i>
              </button>

              <button id="copyOutput">
                <i class="fa fa-copy"></i>
              </button>
            </div>

            <div class="share">
              <button onclick="shareWA()">WhatsApp</button>
              <button onclick="shareTG()">Telegram</button>
              <button onclick="shareTW()">Twitter</button>
            </div>
          </div>
        </div>
      </div>

      <div class="supportRow">
        <h3>Support this project</h3>

        <div class="tips">
          <a href="https://patreon.com/AmateursReleased" target="_blank"
            >Patreon</a
          >

          <a href="https://buymeacoffee.com/silverhawknetwork" target="_blank">
            Buy Me a Coffee
          </a>

          <a href="https://ko-fi.com/teddymulyana" target="_blank"> Ko-fi </a>

          <button onclick="copyGopay()">GoPay</button>
          <button onclick="copyDana()">Dana</button>
        </div>
      </div>
    </div>

    <footer>
      Powered by
      <a href="https://silverhawk.web.id" target="_blank">
        Silverhawk Network
      </a>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
